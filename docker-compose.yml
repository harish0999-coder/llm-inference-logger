version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: llm_postgres
    environment:
      POSTGRES_USER: llmlogger
      POSTGRES_PASSWORD: llmlogger_secret
      POSTGRES_DB: llm_inference
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmlogger -d llm_inference"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: llm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm_backend
    environment:
      DATABASE_URL: postgresql://llmlogger:llmlogger_secret@postgres:5432/llm_inference
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-your_key_here}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_key_here}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
